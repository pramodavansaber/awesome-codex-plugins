<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Codex Plugins</title>
  <meta name="description" content="A directory of verified OpenAI Codex plugins.">
  <meta property="og:title" content="Codex Plugins">
  <meta property="og:description" content="A directory of verified OpenAI Codex plugins.">
  <meta property="og:type" content="website">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>⬡</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #131313;
      --border: #1e1e1e;
      --text: #d4d4d4;
      --text-dim: #737373;
      --text-faint: #404040;
      --blue: #3b82f6;
      --green: #22c55e;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    a { color: inherit; text-decoration: none; }

    .wrap {
      max-width: 52rem;
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    /* Header */
    header {
      padding: 3rem 0 0;
      border-bottom: 1px solid var(--border);
    }
    header .wrap {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding-bottom: 1.5rem;
    }
    .logo {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text-dim);
      letter-spacing: 0.02em;
    }
    .logo span { color: var(--text); }
    header nav { display: flex; gap: 1.5rem; }
    header nav a {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.78rem;
      color: var(--text-dim);
    }
    header nav a:hover { color: var(--text); }

    /* Intro */
    .intro {
      padding: 4rem 0 3rem;
      border-bottom: 1px solid var(--border);
    }
    .intro h1 {
      font-family: 'Instrument Serif', serif;
      font-size: 2.75rem;
      font-weight: 400;
      line-height: 1.15;
      color: #f5f5f5;
      max-width: 28rem;
      margin-bottom: 1rem;
    }
    .intro h1 em {
      font-style: italic;
    }
    .intro p {
      font-size: 0.95rem;
      color: var(--text-dim);
      max-width: 32rem;
      line-height: 1.7;
      margin-bottom: 1.25rem;
    }
    .intro .meta {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.72rem;
      color: var(--text-faint);
      letter-spacing: 0.03em;
    }
    .intro .meta b { color: var(--text-dim); font-weight: 500; }

    /* Search */
    .search {
      padding: 2rem 0;
    }
    .search input {
      width: 100%;
      max-width: 24rem;
      padding: 0.6rem 0.75rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.8rem;
      outline: none;
      transition: border-color 0.15s;
    }
    .search input:focus { border-color: var(--text-faint); }
    .search input::placeholder { color: var(--text-faint); }

    /* Sections */
    .section { padding: 2.5rem 0 0; }
    .section-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.68rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-faint);
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Plugin rows */
    .list { list-style: none; }
    .list li {
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
      padding: 0.55rem 0;
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    .list li:last-child { border-bottom: none; }
    .list li:hover { background: var(--surface); }
    .list .name {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      min-width: 9rem;
    }
    .list .name a { color: inherit; }
    .list .name a:hover { color: var(--blue); }
    .list .desc {
      font-size: 0.82rem;
      color: var(--text-dim);
      flex: 1;
      min-width: 0;
    }
    .list .tag {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.6rem;
      font-weight: 500;
      padding: 0.12rem 0.4rem;
      border-radius: 3px;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      flex-shrink: 0;
    }
    .tag.official { background: rgba(59,130,246,0.1); color: var(--blue); }
    .tag.community { background: rgba(34,197,94,0.08); color: var(--green); }

    .category {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-faint);
      padding: 1.25rem 0 0.4rem;
      font-weight: 500;
    }

    .empty {
      display: none;
      font-size: 0.82rem;
      color: var(--text-faint);
      padding: 3rem 0;
      font-family: 'IBM Plex Mono', monospace;
    }

    /* Footer */
    footer {
      padding: 3rem 0 2.5rem;
      border-top: 1px solid var(--border);
    }
    footer p {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-faint);
    }
    footer a { color: var(--text-dim); }
    footer a:hover { color: var(--text); }

    @media (max-width: 640px) {
      .intro h1 { font-size: 2rem; }
      header nav { display: none; }
      .list li { flex-wrap: wrap; gap: 0.3rem 0.75rem; }
      .list .name { min-width: auto; }
    }
  </style>
</head>
<body>

  <header>
    <div class="wrap">
      <div class="logo"><span>Codex Plugins</span> / directory</div>
      <nav>
        <a href="https://github.com/internet-dot/awesome-codex-plugins" target="_blank" rel="noopener">GitHub</a>
        <a href="https://github.com/internet-dot/awesome-codex-plugins/blob/main/CONTRIBUTING.md" target="_blank" rel="noopener">Submit</a>
      </nav>
    </div>
  </header>

  <div class="wrap">
    <div class="intro">
      <h1>Verified plugins for<br><em>OpenAI Codex</em></h1>
      <p>Community-maintained directory of Codex plugins. Every entry verified to include a valid <code style="font-family:'IBM Plex Mono',monospace;font-size:0.82em;padding:0.1em 0.3em;background:var(--surface);border-radius:3px">.codex-plugin</code> manifest.</p>
      <div class="meta"><b id="total">26</b> plugins &middot; <b id="official-n">12</b> official &middot; <b id="community-n">14</b> community</div>
    </div>

    <div class="search">
      <input type="text" id="q" placeholder="filter..." autocomplete="off">
    </div>

    <div class="section" id="sec-official">
      <div class="section-label">Official</div>
      <ul class="list" id="list-official"></ul>
    </div>

    <div class="section" id="sec-community">
      <div class="section-label">Community</div>
      <div id="cats"></div>
    </div>

    <div class="empty" id="empty">No results.</div>

    <footer>
      <p>Open source, <a href="https://opensource.org/licenses/Apache-2.0" target="_blank" rel="noopener">Apache 2.0</a>.</p>
    </footer>
  </div>

  <script>
    const O = [
      ["Box","Access and manage files","https://developers.openai.com/codex/plugins"],
      ["Cloudflare","Manage Workers, Pages, DNS, and infrastructure","https://developers.openai.com/codex/plugins"],
      ["Figma","Inspect designs, extract specs, document components","https://developers.openai.com/codex/plugins"],
      ["GitHub","Review changes, manage issues, interact with repos","https://developers.openai.com/codex/plugins"],
      ["Gmail","Read, search, compose emails","https://developers.openai.com/codex/plugins"],
      ["Google Drive","Edit and manage files","https://developers.openai.com/codex/plugins"],
      ["Hugging Face","Browse models, datasets, spaces","https://developers.openai.com/codex/plugins"],
      ["Linear","Issues, projects, workflows","https://developers.openai.com/codex/plugins"],
      ["Notion","Pages, databases, content","https://developers.openai.com/codex/plugins"],
      ["Sentry","Error monitoring, triage, performance","https://developers.openai.com/codex/plugins"],
      ["Slack","Messages, channels, conversations","https://developers.openai.com/codex/plugins"],
      ["Vercel","Deploy, preview, manage projects","https://developers.openai.com/codex/plugins"]
    ];

    const C = [
      ["Registry Broker","Delegate tasks to specialist agents via HOL Registry","https://github.com/hashgraph-online/registry-broker-codex-plugin","Development"],
      ["Project Autopilot","Structured project workflow: planning, execution, handoff","https://github.com/AlexMi64/codex-project-autopilot","Development"],
      ["Codex Reviewer","Second-pass review of Claude-driven plans","https://github.com/schuettc/codex-reviewer","Development"],
      ["HOTL Plugin","Human-on-the-Loop coding workflows","https://github.com/yimwoo/hotl-plugin","Development"],
      ["AgentOps","DevOps for coding agents with persistent memory","https://github.com/boshu2/agentops","Development"],
      ["Codex Be Serious","Enforce formal written register across output","https://github.com/lulucatdev/codex-be-serious","Development"],
      ["Chrome DevTools","Wrapper for chrome-devtools-mcp","https://github.com/win4r/chrome-devtools-codex-plugin","Integrations"],
      ["Launch Fast","Rapid SaaS deployment adapter","https://github.com/BlockchainHB/launchfast_codex_plugin","Integrations"],
      ["PapersFlow","Paper discovery, citation verification, DeepScan","https://github.com/papersflow-ai/papersflow-codex-plugin","Integrations"],
      ["Apple Productivity","Calendar and Reminders for macOS","https://github.com/matk0shub/apple-productivity-mcp","Integrations"],
      ["Yandex Direct","Yandex Direct, Wordstat, Metrika, Roistat","https://github.com/nebelov/yandex-direct-for-all","Integrations"],
      ["OpenProject","Team collaboration via OpenProject","https://github.com/varaprasadreddy9676/team-codex-plugins","Integrations"],
      ["OrgX","MCP access and initiative-aware skills","https://github.com/useorgx/orgx-codex-plugin","Integrations"],
      ["Codex Mem","Capture and inject session context","https://github.com/2kDarki/codex-mem","Integrations"]
    ];

    function row([name, desc, url, type], isOfficial) {
      return `<li><span class="name"><a href="${url}" target="_blank" rel="noopener">${name}</a></span><span class="desc">${desc}</span><span class="tag ${isOfficial ? 'official' : 'community'}">${isOfficial ? 'Official' : 'Verified'}</span></li>`;
    }

    const q = document.getElementById('q');
    const lo = document.getElementById('list-official');
    const cats = document.getElementById('cats');
    const empty = document.getElementById('empty');
    const secO = document.getElementById('sec-official');
    const secC = document.getElementById('sec-community');

    function render() {
      const s = q.value.toLowerCase();
      const fo = s ? O.filter(([n,d]) => n.toLowerCase().includes(s) || d.toLowerCase().includes(s)) : O;
      const fc = s ? C.filter(([n,d]) => n.toLowerCase().includes(s) || d.toLowerCase().includes(s)) : C;

      secO.style.display = fo.length ? '' : 'none';
      secC.style.display = fc.length ? '' : 'none';
      empty.style.display = (fo.length || fc.length) ? 'none' : '';

      lo.innerHTML = fo.map(p => row(p, true)).join('');

      const groups = {};
      fc.forEach(p => { (groups[p[3]] = groups[p[3]] || []).push(p); });
      cats.innerHTML = Object.entries(groups).map(([cat, items]) =>
        `<div class="category">${cat}</div><ul class="list">${items.map(p => row(p, false)).join('')}</ul>`
      ).join('');
    }

    render();
    q.addEventListener('input', render);
  </script>
</body>
</html>

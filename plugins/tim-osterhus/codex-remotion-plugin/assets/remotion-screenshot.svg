<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Codex Remotion Plugin Screenshot</title>
  <desc id="desc">An illustrative screenshot showing a Codex plugin panel beside a Remotion composition timeline and JSON schema.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#E2E8F0"/>
      <stop offset="100%" stop-color="#F8FAFC"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="40" y="40" width="350" height="640" rx="28" fill="#0F172A"/>
  <rect x="430" y="40" width="810" height="640" rx="28" fill="#111827"/>
  <text x="80" y="104" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="36" font-weight="700">Remotion Plugin</text>
  <text x="80" y="150" fill="#94A3B8" font-family="Arial, sans-serif" font-size="20">Official docs MCP + launch video workflow</text>
  <rect x="80" y="192" width="270" height="72" rx="16" fill="#1E293B"/>
  <text x="108" y="236" fill="#22C55E" font-family="Courier New, monospace" font-size="24">/build-video</text>
  <rect x="80" y="292" width="270" height="170" rx="18" fill="#1E293B"/>
  <text x="104" y="332" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="22" font-weight="700">Capabilities</text>
  <text x="104" y="374" fill="#CBD5E1" font-family="Arial, sans-serif" font-size="20">- Remotion docs lookup</text>
  <text x="104" y="408" fill="#CBD5E1" font-family="Arial, sans-serif" font-size="20">- Data-driven video schemas</text>
  <text x="104" y="442" fill="#CBD5E1" font-family="Arial, sans-serif" font-size="20">- Composition scaffolding</text>
  <rect x="468" y="90" width="734" height="220" rx="20" fill="#0B1220"/>
  <text x="510" y="136" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="30" font-weight="700">Root.tsx</text>
  <text x="510" y="186" fill="#38BDF8" font-family="Courier New, monospace" font-size="22">registerRoot(RemotionVideoRoot);</text>
  <text x="510" y="224" fill="#CBD5E1" font-family="Courier New, monospace" font-size="22">&lt;Composition id="launch-video" durationInFrames={450}</text>
  <text x="510" y="260" fill="#CBD5E1" font-family="Courier New, monospace" font-size="22">fps={30} width={1920} height={1080} /&gt;</text>
  <rect x="468" y="348" width="452" height="286" rx="20" fill="#F8FAFC"/>
  <text x="506" y="394" fill="#0F172A" font-family="Arial, sans-serif" font-size="30" font-weight="700">Input Schema</text>
  <text x="506" y="442" fill="#334155" font-family="Courier New, monospace" font-size="22">sceneOrder: ["hook", "proof", "cta"]</text>
  <text x="506" y="478" fill="#334155" font-family="Courier New, monospace" font-size="22">brand: { name: "Millrace", accent: "#22C55E" }</text>
  <text x="506" y="514" fill="#334155" font-family="Courier New, monospace" font-size="22">captions: true</text>
  <text x="506" y="550" fill="#334155" font-family="Courier New, monospace" font-size="22">voiceoverScript: "Launch faster with data..."</text>
  <rect x="954" y="348" width="248" height="286" rx="20" fill="#0B1220"/>
  <text x="992" y="394" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="30" font-weight="700">Timeline</text>
  <rect x="992" y="434" width="168" height="26" rx="13" fill="#22C55E"/>
  <rect x="992" y="480" width="122" height="26" rx="13" fill="#38BDF8"/>
  <rect x="992" y="526" width="184" height="26" rx="13" fill="#F97316"/>
  <text x="1180" y="454" fill="#94A3B8" font-family="Arial, sans-serif" font-size="18">Hook</text>
  <text x="1134" y="500" fill="#94A3B8" font-family="Arial, sans-serif" font-size="18">Proof</text>
  <text x="1192" y="546" fill="#94A3B8" font-family="Arial, sans-serif" font-size="18">CTA</text>
</svg>

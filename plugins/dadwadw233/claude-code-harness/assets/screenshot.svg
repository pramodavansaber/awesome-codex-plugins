<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Claude Code Harness screenshot</title>
  <desc id="desc">A mock screenshot showing a harness blueprint workflow with request assembly, loop, memory, permissions, and recovery.</desc>
  <rect width="1400" height="900" rx="28" fill="#0A1227"/>
  <rect x="40" y="40" width="1320" height="820" rx="24" fill="#0F1F48"/>
  <rect x="68" y="68" width="1264" height="56" rx="14" fill="#132A61"/>
  <circle cx="102" cy="96" r="8" fill="#FF6B6B"/>
  <circle cx="128" cy="96" r="8" fill="#FFD166"/>
  <circle cx="154" cy="96" r="8" fill="#4CD964"/>
  <text x="190" y="104" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" fill="#F6F9FF" font-weight="700">Harness Blueprint Output</text>

  <rect x="82" y="156" width="368" height="666" rx="20" fill="#102655"/>
  <text x="112" y="204" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" fill="#F6F9FF" font-weight="700">Input Idea</text>
  <rect x="112" y="236" width="308" height="120" rx="16" fill="#173066"/>
  <text x="136" y="282" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" fill="#E8F0FF">Build a long-running coding agent</text>
  <text x="136" y="318" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" fill="#E8F0FF">that can inspect a repo, use tools,</text>
  <text x="136" y="354" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" fill="#E8F0FF">and recover after interruptions.</text>
  <text x="112" y="420" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" fill="#9CC0FF" font-weight="700">The skill pushes for concrete planes:</text>
  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" fill="#F6F9FF">
    <text x="128" y="468">• request assembly</text>
    <text x="128" y="510">• turn loop</text>
    <text x="128" y="552">• tool boundaries</text>
    <text x="128" y="594">• memory strategy</text>
    <text x="128" y="636">• permissions</text>
    <text x="128" y="678">• transcript and recovery</text>
    <text x="128" y="720">• extension surfaces</text>
  </g>

  <rect x="490" y="156" width="800" height="666" rx="20" fill="#F6F9FF"/>
  <text x="530" y="204" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" fill="#173066" font-weight="700">Harness Blueprint</text>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">
    <rect x="530" y="242" width="220" height="54" rx="14" fill="#0B5FFF"/>
    <text x="560" y="276" fill="#F6F9FF">Request Assembly</text>
    <rect x="776" y="242" width="164" height="54" rx="14" fill="#4E88FF"/>
    <text x="809" y="276" fill="#F6F9FF">Turn Loop</text>
    <rect x="966" y="242" width="150" height="54" rx="14" fill="#78A6FF"/>
    <text x="999" y="276" fill="#173066">Tool Plane</text>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" fill="#173066">
    <rect x="530" y="324" width="346" height="126" rx="18" fill="#DCE8FF"/>
    <text x="554" y="364">System prompt layers, user context,</text>
    <text x="554" y="396">tool exposure, normalized transcript,</text>
    <text x="554" y="428">and per-turn dynamic additions.</text>

    <rect x="900" y="324" width="346" height="126" rx="18" fill="#DCE8FF"/>
    <text x="924" y="364">Gather, decide, act, verify,</text>
    <text x="924" y="396">retry or escalate, then stop cleanly</text>
    <text x="924" y="428">with resumable state.</text>

    <rect x="530" y="486" width="346" height="126" rx="18" fill="#EAF1FF"/>
    <text x="554" y="526">Memory layers: active context,</text>
    <text x="554" y="558">durable memory, retrieval, compaction.</text>

    <rect x="900" y="486" width="346" height="126" rx="18" fill="#EAF1FF"/>
    <text x="924" y="526">Permissions, approvals, auditability,</text>
    <text x="924" y="558">and bounded tool contracts.</text>

    <rect x="530" y="648" width="716" height="126" rx="18" fill="#DCE8FF"/>
    <text x="554" y="688">Recovery and extension: transcript spine, resume points, partial-work continuity,</text>
    <text x="554" y="720">plugin surfaces, MCP, subagents, and future runtime expansion.</text>
  </g>

  <g stroke="#0B5FFF" stroke-width="6" fill="none" stroke-linecap="round">
    <path d="M874 269 H900"/>
    <path d="M1116 269 H1148"/>
    <path d="M703 450 V486"/>
    <path d="M1073 450 V486"/>
    <path d="M888 711 H900"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Claude Code Harness logo</title>
  <desc id="desc">A wide logo visualizing harness planes around an agent runtime.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#081B43"/>
      <stop offset="55%" stop-color="#0B5FFF"/>
      <stop offset="100%" stop-color="#4E88FF"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" rx="36" fill="url(#bg)"/>
  <g fill="none" stroke="#B9D0FF" opacity="0.45">
    <circle cx="860" cy="316" r="180" stroke-width="2"/>
    <circle cx="860" cy="316" r="120" stroke-width="2"/>
    <circle cx="860" cy="316" r="64" stroke-width="2"/>
  </g>
  <g font-family="Inter, Segoe UI, Arial, sans-serif" fill="#F6F9FF">
